apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-devs-{{ .Values.global.compositionName }}-get-pods-in-namespace
  namespace: {{ .Values.global.compositionName }}
rules:
- apiGroups: [""]
  resources: ["pods","configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["cronjobs","jobs"]
  verbs: ["get", "list", "watch"]
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-devs-{{ .Values.global.compositionNamespace }}-get-any-widgets-in-{{ .Values.global.compositionName }}
  namespace: {{ .Values.global.compositionName }}
rules:
- apiGroups:
  - widgets.templates.krateo.io
  resources:
  - '*'
  verbs:
  - create
  - delete
  - get
  - list
- apiGroups:
  - templates.krateo.io
  resources:
  - restactions
  verbs:
  - get
  - list
  - create
  - delete

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-devs-{{ .Values.global.compositionNamespace }}-get-any-widgets-in-{{ .Values.global.compositionName }}
  namespace: {{ .Values.global.compositionName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: platform-devs-{{ .Values.global.compositionNamespace }}-get-any-widgets-in-{{ .Values.global.compositionName }}
subjects:
- kind: Group
  name: platform-devs-{{ .Values.global.compositionNamespace }}
  apiGroup: rbac.authorization.k8s.io